name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitalink
          path: .build/release/vitalink