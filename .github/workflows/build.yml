name: Build Vitalink

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch Package.swift (macOS v26 → v15)
        run: |
          if grep -q 'platforms: \[.macOS(.v26)\]' Package.swift; then
            sed -i '' 's/platforms: \[.macOS(.v26)\]/platforms: [.macOS(.v15)]/g' Package.swift
            echo "Patched Package.swift:"
            grep -n 'platforms' Package.swift
          else
            echo "No patch needed or pattern not found"
          fi

      - name: Build release binary
        run: swift build -c release

      - name: Zip the binary
        run: |
          cd .build/release
          zip vitalink.zip vitalink
          echo "=== ZIP contents ==="
          ls -lh vitalink.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitalink-binary
          path: .build/release/vitalink.zip